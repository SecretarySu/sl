    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" stroke="url(#g)" stroke-width="2"/>
  <text x="50%" y="53%" dominant-baseline="central" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="38" font-weight="700" fill="url(#g)" filter="url(#gl)">苏</text>
